            <h1>想说的话</h1>
            <p>
                站在新环境的起点，我想大家的心情都和我一样，既有些许紧张又充满期待。我们即将一起翻开青春里崭新的一页，这是一件多么奇妙又幸运的事。我想对大家说，不必害怕陌生，因为每一次交流都会让距离拉近；不必担心前行孤单，因为从今天起，我们将风雨同路。希望我们都能拿出最真诚的心去对待彼此，多一份理解，多一份支持。愿我们的班级充满温暖与善意，愿我们都能在这段旅程中，变成更好的自己。未来几年，请多多指教！
            </p>
